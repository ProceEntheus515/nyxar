[pytest]
asyncio_mode = auto

markers =
    e2e: End-to-end tests requiring full docker-compose stack (deselect with -m "not e2e")
    integration: Integration tests requiring real Redis/MongoDB (deselect with -m "not integration")
    v2: NYXAR V2 integration-style tests (mocks; subconjunto usa Redis emulado)
    unit: Pure unit tests with no external dependencies

addopts =
    --tb=short
    -q

[tool.pytest.ini_options]
testpaths = ["tests"]
