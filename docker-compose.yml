version: '3.9'

networks:
  nyxar-net:
    driver: bridge

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - ./data/redis:/data
      - ./data/redis-security.conf:/etc/redis/redis-security.conf:ro
    command:
      - sh
      - -c
      - redis-server /etc/redis/redis-security.conf --requirepass "$$REDIS_PASSWORD"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file: .env
    networks:
      - nyxar-net

  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    command:
      - mongod
      - --config
      - /etc/mongo/mongo-security-docker.conf
      - --auth
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: nyxar
      MONGO_READER_PASSWORD: ${MONGO_READER_PASSWORD}
      MONGO_WRITER_PASSWORD: ${MONGO_WRITER_PASSWORD}
      MONGO_ADMIN_PASSWORD: ${MONGO_ADMIN_PASSWORD}
    volumes:
      - ./data/mongodb:/data/db
      - ./data/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
      - ./data/mongo-security-init.js:/docker-entrypoint-initdb.d/mongo-security-init.js:ro
      - ./mongo-security-docker.conf:/etc/mongo/mongo-security-docker.conf:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mongosh --quiet -u "$$MONGO_INITDB_ROOT_USERNAME" -p "$$MONGO_INITDB_ROOT_PASSWORD" --authenticationDatabase admin --eval "db.adminCommand({ping:1})" || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file: .env
    networks:
      nyxar-net:
        aliases:
          - mongo

  # One-shot: genera .nyxar_infrastructure_map.json antes del collector.
  # En Windows, crear antes un archivo JSON valido en la raiz del repo (p. ej. {}).
  discovery:
    build:
      context: .
      dockerfile: nyxar/discovery/Dockerfile
    env_file: .env
    environment:
      NETWORK_RANGE: ${NETWORK_RANGE:-auto}
      NYXAR_INFRA_MAP_PATH: /app/.nyxar_infrastructure_map.json
    volumes:
      - ./.nyxar_infrastructure_map.json:/app/.nyxar_infrastructure_map.json
      - /var/log:/host/logs:ro
    networks:
      - nyxar-net
    restart: "no"

  pihole:
    image: pihole/pihole:latest
    restart: unless-stopped
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "8080:80"
    volumes:
      - ./data/pihole/logs:/var/log/pihole
    env_file: .env
    networks:
      - nyxar-net

  collector:
    build: ./collector
    restart: unless-stopped
    depends_on:
      discovery:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    volumes:
      - ./data/pihole/logs:/logs/dns:ro
    env_file: .env
    networks:
      - nyxar-net

  enricher:
    build: ./enricher
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    env_file: .env
    networks:
      - nyxar-net

  correlator:
    build: ./correlator
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    env_file: .env
    networks:
      - nyxar-net

  ai_analyst:
    build: ./ai_analyst
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    networks:
      - nyxar-net

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    networks:
      - nyxar-net

  observability:
    build:
      context: .
      dockerfile: observability/Dockerfile
    restart: unless-stopped
    ports:
      - "9090:9090"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    networks:
      - nyxar-net

  # Worker sin puerto HTTP: email/WhatsApp según NOTIFY_* en .env
  notifier:
    build:
      context: .
      dockerfile: notifier/Dockerfile
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    networks:
      - nyxar-net

  simulator:
    build: ./simulator
    restart: unless-stopped
    profiles:
      - lab
    depends_on:
      - collector
      - redis
    env_file: .env
    networks:
      - nyxar-net

  dashboard:
    build: ./dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api
    env_file: .env
    networks:
      - nyxar-net

  # Opcional: motor SOAR (montar el repo y ejecutar el modulo; habilitar AUTO_RESPONSE_ENABLED en .env)
