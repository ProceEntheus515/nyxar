  <circle cx="50" cy="10" r="3" fill="#38B2CC" />
  <circle cx="90" cy="30" r="4" fill="#38B2CC" filter="url(#glow)" /> <circle cx="90" cy="70" r="3" fill="#38B2CC" />
  <circle cx="50" cy="90" r="3" fill="#38B2CC" />
  <circle cx="10" cy="70" r="3" fill="#38B2CC" />
  <circle cx="10" cy="30" r="3" fill="#38B2CC" />
  
  <text x="50" y="115" 
        font-family="monospace" 
