# MongoDB — producción (TLS obligatorio). Montar nyxar-mongo.pem y usar con docker-compose.prod.yml.
# bindIp 0.0.0.0: mismo criterio que mongo-security-docker.conf; aislamiento = red Docker sin ports:.

security:
  authorization: enabled
  javascriptEnabled: false

net:
  bindIp: 0.0.0.0
  port: 27017
  tls:
    mode: requireTLS
    certificateKeyFile: /etc/ssl/nyxar-mongo.pem

operationProfiling:
  slowOpThresholdMs: 100
  mode: slowOp
