# Overlay producción — MongoDB endurecido (TLS, contenedor sin privilegios, sin puertos publicados).
# Uso: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Requisitos previos:
# - Generar data/ssl/nyxar-mongo.pem (certificado + clave en un solo PEM).
# - Definir MONGO_INITDB_ROOT_*, MONGO_READER_PASSWORD, MONGO_WRITER_PASSWORD, MONGO_ADMIN_PASSWORD.
# - MONGODB_URL en servicios con tls=true y authSource=nyxar (ver .env.example).

services:
  mongodb:
    command: ["mongod", "--config", "/etc/mongo/mongo-security.conf", "--auth"]
    environment:
      MONGO_READER_PASSWORD: ${MONGO_READER_PASSWORD}
      MONGO_WRITER_PASSWORD: ${MONGO_WRITER_PASSWORD}
      MONGO_ADMIN_PASSWORD: ${MONGO_ADMIN_PASSWORD}
    volumes:
      - ./data/ssl/nyxar-mongo.pem:/etc/ssl/nyxar-mongo.pem:ro
      - ./mongo-security.conf:/etc/mongo/mongo-security.conf:ro
    user: "999:999"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
