# MongoDB — perfil Docker desarrollo / stack integrado (sin TLS en tránsito).
# bindIp 0.0.0.0: escucha en todas las interfaces del contenedor; la seguridad es no publicar puertos
# hacia el host (ver docker-compose). No uses 127.0.0.1 solo: el resto de servicios no conectarían.

security:
  authorization: enabled
  javascriptEnabled: false

net:
  bindIp: 0.0.0.0
  port: 27017

operationProfiling:
  slowOpThresholdMs: 100
  mode: slowOp
