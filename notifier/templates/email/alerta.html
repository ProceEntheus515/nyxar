<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>{{ titulo }}</title>
</head>
<body style="margin:0;padding:0;background-color:#0d1117;font-family:Arial,Helvetica,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#0d1117;padding:24px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;background-color:#161b22;border:1px solid #21262d;border-radius:8px;">
          <tr>
            <td style="padding:20px 24px;border-bottom:1px solid #21262d;">
              <span style="color:#00d4ff;font-size:12px;text-transform:uppercase;letter-spacing:0.08em;">NYXAR</span>
              <h1 style="margin:8px 0 0;color:#e6edf3;font-size:18px;line-height:1.3;">{{ titulo }}</h1>
              <p style="margin:8px 0 0;color:#8b949e;font-size:12px;">Severidad: {{ severidad }}</p>
            </td>
          </tr>
          <tr>
            <td style="padding:20px 24px;color:#e6edf3;font-size:14px;line-height:1.55;">
              {{ cuerpo_html | safe }}
            </td>
          </tr>
          {% if link %}
          <tr>
            <td style="padding:0 24px 24px;">
              <table role="presentation" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="background-color:#00d4ff;border-radius:4px;">
                    <a href="{{ link }}" style="display:inline-block;padding:10px 18px;color:#0d1117;font-weight:bold;text-decoration:none;font-size:14px;">Ver en dashboard</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          {% endif %}
          <tr>
            <td style="padding:16px 24px;border-top:1px solid #21262d;color:#6e7681;font-size:11px;line-height:1.4;">
              Este email fue generado automáticamente por NYXAR.
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
