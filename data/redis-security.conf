# S06 — Redis endurecido (NYXAR).
# requirepass NO va aquí: Redis no expande variables de entorno; se pasa en el comando Docker
# (redis-server este.conf --requirepass "$REDIS_PASSWORD").

bind 0.0.0.0
protected-mode no
port 6379

tcp-backlog 511
timeout 0
tcp-keepalive 300

daemonize no
supervised no

loglevel notice
# Vacío = stdout (adecuado para Docker; evita escribir bajo filesystem read-only).
logfile ""

databases 16
dir /data

save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
dbfilename dump.rdb

appendonly yes
appendfsync everysec
appendfilename "appendonly.aof"

rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command CONFIG NYXAR_CONFIG_9a7b3c
rename-command DEBUG ""
rename-command SLAVEOF ""
rename-command REPLICAOF ""
rename-command EVAL ""
rename-command SCRIPT ""

maxmemory 512mb
maxmemory-policy allkeys-lru
